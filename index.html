<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1d2a3a">
<title>Flavor Finder · Culver's Near You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:        #f6f1e6;
    --cream-deep:   #ede5d2;
    --surface:      #ffffff;
    --line:         #e3dccb;
    --ink:          #1d2a3a;
    --ink-soft:     #5a6573;
    --ink-mute:     #8b8579;
    --navy:         #1d2a3a;
    --blue:         #1f4d7a;
    --caramel:      #c97a1a;
    --caramel-soft: #f5e6d0;
    --warn:         #b23b3b;
    --radius:       14px;
    --shadow:       0 1px 0 rgba(29,42,58,.04), 0 8px 24px -12px rgba(29,42,58,.12);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ---------- Header ---------- */
  header {
    background: var(--navy);
    color: var(--cream);
    padding: 22px 20px 18px;
    padding-top: calc(22px + env(safe-area-inset-top));
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin: 0 0 4px;
  }
  .brand h1 {
    font-family: 'Fraunces', serif;
    font-variation-settings: "opsz" 96;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -0.01em;
    margin: 0;
    line-height: 1;
  }
  .brand small {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #9bb1c7;
  }
  .tagline {
    font-size: 13px;
    color: #b8c5d3;
    margin: 0;
  }

  /* ---------- Controls ---------- */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    padding: 16px 20px;
    display: grid;
    gap: 14px;
  }
  .field { display: grid; gap: 6px; }
  .field label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .field label .value {
    font-family: 'JetBrains Mono', monospace;
    color: var(--blue);
    font-size: 13px;
    letter-spacing: 0;
    text-transform: none;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: var(--cream-deep);
    border-radius: 4px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    background: var(--blue);
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid var(--surface);
    box-shadow: 0 1px 4px rgba(0,0,0,.2);
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px; height: 22px;
    background: var(--blue);
    border-radius: 50%;
    border: 3px solid var(--surface);
    cursor: pointer;
  }

  input[type="text"] {
    font: inherit;
    font-size: 15px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--cream);
    color: var(--ink);
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="text"]:focus {
    border-color: var(--blue);
    background: var(--surface);
  }

  .actions { display: flex; gap: 8px; }
  button {
    font: inherit;
    font-weight: 600;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  button.primary {
    background: var(--blue);
    color: white;
    border-color: var(--blue);
    flex: 1;
  }
  button.primary:hover { background: #163d61; }
  button.secondary {
    background: var(--surface);
    color: var(--ink);
    border-color: var(--line);
  }
  button.secondary:hover { background: var(--cream-deep); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  details.manual {
    margin-top: -4px;
    font-size: 13px;
  }
  details.manual summary {
    cursor: pointer;
    color: var(--ink-soft);
    font-weight: 500;
    list-style: none;
    padding: 4px 0;
    user-select: none;
  }
  details.manual summary::-webkit-details-marker { display: none; }
  details.manual summary::before {
    content: "▸ ";
    display: inline-block;
    transition: transform .15s;
    color: var(--ink-mute);
  }
  details.manual[open] summary::before { transform: rotate(90deg); }
  .manual-body { padding-top: 10px; display: grid; gap: 10px; }

  /* ---------- Status ---------- */
  .status {
    padding: 10px 20px;
    font-size: 12px;
    color: var(--ink-mute);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
  }
  .status .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ink-mute);
    margin-right: 6px;
    vertical-align: middle;
    transform: translateY(-1px);
  }
  .status.ok .dot { background: #4a9b5e; }
  .status.err .dot { background: var(--warn); }
  .status.busy .dot {
    background: var(--blue);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ---------- Results ---------- */
  main {
    padding: 8px 16px 40px;
    display: grid;
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px 0;
  }
  .card-head .place {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
    margin: 0;
    flex: 1;
    min-width: 0;
  }
  .card-head .place .addr {
    display: block;
    font-weight: 400;
    color: var(--ink-mute);
    font-size: 11px;
    margin-top: 2px;
  }
  .distance {
    flex: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--blue);
    background: #eaf1f8;
    padding: 4px 9px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .flavor {
    font-family: 'Fraunces', serif;
    font-variation-settings: "opsz" 144;
    font-weight: 700;
    font-size: 28px;
    line-height: 1.05;
    letter-spacing: -0.015em;
    color: var(--blue);
    padding: 6px 16px 4px;
    margin: 0;
  }
  .flavor.unknown {
    color: var(--ink-mute);
    font-style: italic;
    font-weight: 400;
    font-size: 18px;
  }

  /* The good-news state: a favorite-keyword flavor is up today. */
  .card.match { border-color: var(--caramel); }
  .card.match .flavor { color: var(--caramel); }
  .alert {
    background: var(--caramel-soft);
    color: var(--caramel);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 7px 16px;
    border-bottom: 1px solid #ebd3b0;
  }

  .week {
    padding: 6px 16px 14px;
    display: grid;
    gap: 4px;
  }
  .week-row {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 12px;
    font-size: 12px;
    color: var(--ink-soft);
    align-items: baseline;
  }
  .week-row .d {
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink-mute);
    font-size: 11px;
    white-space: nowrap;
  }
  .week-row.fav { color: var(--caramel); font-weight: 600; }
  .week-row.fav .d { color: var(--caramel); }

  /* Tap-to-expand affordance */
  .card { cursor: pointer; transition: border-color .15s; }
  .card:hover { border-color: #d8cfba; }
  .week-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 16px 12px;
    font-size: 11px;
    color: var(--ink-mute);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
    user-select: none;
  }
  .week-toggle .chev {
    transition: transform .18s;
    display: inline-block;
  }
  .card.open .week-toggle .chev { transform: rotate(90deg); }
  .week-loading {
    padding: 2px 16px 12px;
    font-size: 12px;
    color: var(--ink-mute);
    font-family: 'JetBrains Mono', monospace;
  }

  .card.err .flavor {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-style: normal;
    font-weight: 500;
    color: var(--warn);
    padding-top: 10px;
    padding-bottom: 12px;
  }

  /* ---------- Empty / placeholder ---------- */
  .empty {
    text-align: center;
    padding: 48px 24px;
    color: var(--ink-mute);
  }
  .empty h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 22px;
    color: var(--ink);
    margin: 0 0 8px;
  }
  .empty p { margin: 0; font-size: 14px; }

  /* ---------- Footer note ---------- */
  .colophon {
    text-align: center;
    font-size: 11px;
    color: var(--ink-mute);
    padding: 20px;
  }
  .colophon a { color: var(--ink-soft); }

  /* Wider screens */
  @media (min-width: 640px) {
    body { max-width: 540px; margin: 0 auto; box-shadow: 0 0 60px rgba(0,0,0,.08); min-height: 100vh; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Flavor Finder</h1>
    <small>FOTD · NEAR YOU</small>
  </div>
  <p class="tagline">Today's frozen custard at Culver's within reach.</p>
</header>

<section class="controls">
  <div class="field">
    <label for="dist">Search radius <span class="value"><span id="distLabel">15</span> miles</span></label>
    <input type="range" id="dist" min="3" max="25" value="15" step="1">
  </div>
  <div class="field">
    <label for="fav">Flag if today's flavor contains <span class="value" id="favHint">cookie dough</span></label>
    <input type="text" id="fav" placeholder="cookie dough" value="cookie dough" autocomplete="off" autocapitalize="off">
  </div>
  <div class="actions">
    <button class="primary" id="goBtn">Use my location</button>
    <button class="secondary" id="refreshBtn" disabled title="Refresh">↻</button>
  </div>
  <details class="manual">
    <summary>Set location manually</summary>
    <div class="manual-body">
      <input type="text" id="manualInput" placeholder="ZIP code (e.g. 54915)" autocomplete="postal-code" inputmode="numeric">
    </div>
  </details>
</section>

<div class="status" id="status"><span class="dot"></span><span id="statusText">Tap "Use my location" to begin.</span></div>

<main id="results"></main>

<p class="colophon">
  Reads today's flavor straight from culvers.com.
</p>

<script>
/* ============================================================
   Flavor Finder — powered by Culver's public locator endpoint.

   One GET to /api/locator/getLocations returns every nearby store
   with its address, coordinates, slug, and TODAY'S flavor — all in
   a single request. No location file to maintain, no per-store page
   scraping, always current nationwide. Because it's on culvers.com,
   the browser can't call it directly (CORS), so we route through a
   public CORS proxy — but it's just one request per search.
   ============================================================ */

const LOCATOR = "https://www.culvers.com/api/locator/getLocations";
const MILES_TO_METERS = 1609.34;

const PROXIES = [
  (u) => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
  (u) => "https://corsproxy.io/?url=" + encodeURIComponent(u),
  (u) => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u),
];

const $ = (id) => document.getElementById(id);
const distSlider = $("dist");
const distLabel  = $("distLabel");
const favInput   = $("fav");
const favHint    = $("favHint");
const goBtn      = $("goBtn");
const refreshBtn = $("refreshBtn");
const statusEl   = $("status");
const statusText = $("statusText");
const results    = $("results");

let userLoc = null;      // {lat, lng}
let lastStores = [];     // most recent locator results (already sorted by distance)

// Re-render on control changes. The radius and keyword both only affect
// what we SHOW from the last fetch — widening the radius refetches (the
// locator is capped by radius), so radius triggers a debounced refetch.
let radiusTimer = null;
distSlider.addEventListener("input", () => {
  distLabel.textContent = distSlider.value;
  if (!userLoc) return;
  render();  // instant feedback from cached results
  clearTimeout(radiusTimer);
  radiusTimer = setTimeout(fetchAndRender, 400);
});
favInput.addEventListener("input", () => {
  favHint.textContent = favInput.value.trim() || "—";
  render();
});
goBtn.addEventListener("click", locate);
refreshBtn.addEventListener("click", () => { if (userLoc) fetchAndRender(); });

function setStatus(text, kind) {
  statusText.textContent = text;
  statusEl.className = "status" + (kind ? " " + kind : "");
}

// Manual location entry: 5-digit ZIP (geocoded) or raw "lat, lng".
$("manualInput").addEventListener("change", (e) => resolveManual(e.target.value));

async function resolveManual(raw) {
  const v = String(raw).trim();
  if (!v) return;
  if (/^\d{5}$/.test(v)) {
    try {
      setStatus(`Looking up ZIP ${v}…`, "busy");
      const r = await fetch(`https://api.zippopotam.us/us/${v}`);
      if (!r.ok) throw new Error(r.status === 404 ? "not a valid ZIP" : "HTTP " + r.status);
      const data = await r.json();
      const p = data.places && data.places[0];
      if (!p) throw new Error("no location data");
      setLoc(parseFloat(p.latitude), parseFloat(p.longitude),
             `${p["place name"]}, ${p["state abbreviation"]} ${v}`);
    } catch (e) {
      setStatus(`Couldn't look up ZIP ${v}: ${e.message}`, "err");
    }
    return;
  }
  const m = v.match(/(-?\d+(\.\d+)?)\s*,\s*(-?\d+(\.\d+)?)/);
  if (m) { setLoc(parseFloat(m[1]), parseFloat(m[3]), "manual coords"); return; }
  setStatus("Enter a 5-digit ZIP code (or 'lat, lng' coordinates).", "err");
}

function setLoc(lat, lng, label) {
  userLoc = { lat, lng };
  goBtn.textContent = "Update location";
  refreshBtn.disabled = false;
  setStatus(`Using ${label} as your location.`, "ok");
  fetchAndRender();
}

function locate() {
  if (!navigator.geolocation) {
    setStatus("Geolocation isn't available — use 'Set location manually' below.", "err");
    return;
  }
  setStatus("Asking your browser for location…", "busy");
  goBtn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      goBtn.disabled = false;
      setLoc(pos.coords.latitude, pos.coords.longitude, "your location");
    },
    (err) => {
      goBtn.disabled = false;
      const blocked = /permissions policy|disabled/i.test(err.message);
      setStatus(blocked
        ? "Geolocation is blocked here. Use 'Set location manually' below, or open the page in a real browser tab."
        : "Location denied or unavailable: " + err.message + ". Try the manual option below.", "err");
    },
    { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 }
  );
}

function distanceMiles(a, b) {
  const R = 3958.8, toRad = (d) => d * Math.PI / 180;
  const dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
  const lat1 = toRad(a.lat), lat2 = toRad(b.lat);
  const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

// Fetch through the first proxy that works.
async function proxiedJson(url) {
  let lastErr;
  for (const wrap of PROXIES) {
    try {
      const bust = (url.includes("?") ? "&" : "?") + "_cb=" + Date.now();
      const r = await fetch(wrap(url + bust), { cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      const text = await r.text();
      return JSON.parse(text);
    } catch (e) { lastErr = e; }
  }
  throw lastErr;
}

// Fetch raw page text through the proxies (for the per-store calendar).
async function proxiedText(url) {
  let lastErr;
  for (const wrap of PROXIES) {
    try {
      const bust = (url.includes("?") ? "&" : "?") + "_cb=" + Date.now() + "_" + Math.random().toString(36).slice(2);
      const r = await fetch(wrap(url + bust), { cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      return await r.text();
    } catch (e) { lastErr = e; }
  }
  throw lastErr;
}

// ---- Week-ahead forecast (fetched on tap, one store at a time) ----
const weekCache = {};   // slug -> [{date, flavor}] | "error"

function todayIso() {
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function dayLabel(iso) {
  const [y,m,d] = iso.split("-").map(Number);
  return new Date(y, m-1, d).toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
}

/* Fetch one store's calendar from its page's __NEXT_DATA__ blob, verifying
   the page's own slug matches what we asked for (guards against a proxy
   handing back a different store's cached page). Returns upcoming days only. */
async function fetchWeek(slug) {
  if (weekCache[slug] && weekCache[slug] !== "error") return weekCache[slug];
  const url = `https://www.culvers.com/restaurants/${slug}`;
  let lastErr;
  for (let attempt = 0; attempt < 4; attempt++) {
    try {
      const html = await proxiedText(url);
      const m = /<script id="__NEXT_DATA__" type="application\/json">([\s\S]*?)<\/script>/.exec(html);
      if (!m) throw new Error("no data");
      const nd = JSON.parse(m[1]);
      const cd = nd?.props?.pageProps?.page?.customData;
      const gotSlug = cd?.restaurantCalendar?.restaurant?.slug || cd?.restaurantDetails?.urlSlug || nd?.query?.slug;
      if (gotSlug && gotSlug !== slug) { lastErr = new Error("wrong store"); }
      else {
        const cal = cd?.restaurantCalendar?.flavors;
        const today = todayIso();
        const out = [];
        if (Array.isArray(cal)) {
          for (const f of cal) {
            if (f?.onDate && f?.title) {
              const iso = f.onDate.slice(0, 10);
              if (iso > today) out.push({ date: iso, flavor: f.title });
            }
          }
        }
        out.sort((a, b) => a.date.localeCompare(b.date));
        const next7 = out.slice(0, 7);
        weekCache[slug] = next7;
        return next7;
      }
    } catch (e) { lastErr = e; }
    await new Promise((r) => setTimeout(r, 300 * (attempt + 1) + Math.random() * 300));
  }
  throw lastErr || new Error("fetch failed");
}

// Toggle a card's week-ahead panel; fetch on first open.
async function toggleWeek(card, store) {
  const existing = card.querySelector(".week, .week-loading");
  if (card.classList.contains("open")) {
    card.classList.remove("open");
    if (existing) existing.remove();
    return;
  }
  card.classList.add("open");
  const fav = favInput.value.trim().toLowerCase();

  const loading = document.createElement("div");
  loading.className = "week-loading";
  loading.textContent = "Loading the week…";
  card.appendChild(loading);

  try {
    const week = await fetchWeek(store.slug);
    loading.remove();
    if (!card.classList.contains("open")) return;  // user closed it meanwhile
    const div = document.createElement("div");
    div.className = "week";
    if (week.length === 0) {
      div.innerHTML = `<div class="week-row"><span>No upcoming flavors listed.</span></div>`;
    } else {
      div.innerHTML = week.map(({ date, flavor }) => {
        const fv = fav && flavor.toLowerCase().includes(fav) ? " fav" : "";
        return `<div class="week-row${fv}"><span class="d">${dayLabel(date)}</span><span>${escapeHtml(flavor)}</span></div>`;
      }).join("");
    }
    card.appendChild(div);
  } catch (e) {
    loading.textContent = "Couldn't load the week — tap to retry.";
  }
}

// Query the locator for stores near userLoc within the current radius.
async function fetchAndRender() {
  if (!userLoc) return;
  const miles = +distSlider.value;
  const meters = Math.round(miles * MILES_TO_METERS);
  const url = `${LOCATOR}?lat=${userLoc.lat}&long=${userLoc.lng}&radius=${meters}&limit=100&layer=`;

  setStatus("Finding nearby Culver's…", "busy");
  try {
    const data = await proxiedJson(url);
    const fences = data?.data?.geofences || [];
    lastStores = fences.map((g) => {
      const m = g.metadata || {};
      const c = g.geometryCenter?.coordinates || [null, null];
      const lat = c[1], lng = c[0];
      return {
        slug: m.slug,
        city: m.city || "",
        state: m.state || "",
        addr: m.street || "",
        today: m.flavorOfDayName || null,
        closed: m.isTemporarilyClosed === true,
        lat, lng,
        miles: (lat != null && lng != null) ? distanceMiles(userLoc, { lat, lng }) : Infinity,
      };
    }).sort((a, b) => a.miles - b.miles);

    const t = new Date().toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
    setStatus(`Updated ${t} — ${lastStores.length} within ${miles} mi`, "ok");
    render();
  } catch (e) {
    setStatus("Couldn't reach Culver's locator through any proxy. Try again in a minute.", "err");
  }
}

function render() {
  if (!userLoc) return;
  const maxMi = +distSlider.value;
  const fav = favInput.value.trim().toLowerCase();

  // Filter to radius (the locator is radius-bounded, but re-filter in case
  // the slider narrowed since the last fetch), already distance-sorted.
  const rows = lastStores.filter((s) => s.miles <= maxMi);

  results.innerHTML = "";
  if (rows.length === 0) {
    const div = document.createElement("div");
    div.className = "empty";
    div.innerHTML = `<h2>Nothing within ${maxMi} miles</h2><p>Try widening the radius.</p>`;
    results.appendChild(div);
    return;
  }

  for (const r of rows) {
    const card = document.createElement("article");
    card.className = "card";

    const isMatch = fav && r.today && r.today.toLowerCase().includes(fav);
    let alertHtml = "";
    if (isMatch) {
      card.classList.add("match");
      alertHtml = `<div class="alert">★ ${escapeHtml(fav)} is on today</div>`;
    }

    const flavorHtml = r.closed
      ? `<p class="flavor unknown">Temporarily closed</p>`
      : r.today
        ? `<p class="flavor">${escapeHtml(r.today)}</p>`
        : `<p class="flavor unknown">No flavor listed for today.</p>`;

    const place = escapeHtml(r.city) + (r.state ? ", " + escapeHtml(r.state) : "");
    const addr = r.addr ? `<span class="addr">${escapeHtml(r.addr)}</span>` : "";

    card.innerHTML = `
      ${alertHtml}
      <div class="card-head">
        <p class="place">${place}${addr}</p>
        <span class="distance">${r.miles.toFixed(1)} mi</span>
      </div>
      ${flavorHtml}
      ${r.closed ? "" : `<div class="week-toggle"><span class="chev">▸</span> tap for the next 7 days</div>`}
    `;
    if (!r.closed) {
      card.addEventListener("click", () => toggleWeek(card, r));
    }
    results.appendChild(card);
  }
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

// Initial labels.
distLabel.textContent = distSlider.value;
favHint.textContent = favInput.value;
setStatus('Tap "Use my location" or enter a ZIP to begin.', "");
</script>
</body>
</html>
